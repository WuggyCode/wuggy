# Build and publish Wuggy desktop releases.
#
# Triggered by pushing a version tag (e.g. v1.2.0).
# Produces:
#   macOS  — Wuggy-<version>.dmg  (via PyInstaller + create-dmg)
#   Windows — Wuggy-<version>-windows.zip  (via PyInstaller)
#
# Both artifacts are attached to a GitHub release created for the tag.

name: Release

on:
  push:
    tags:
      - 'v[0-9]*'

jobs:
  # ── Create the GitHub release first so both platform jobs can upload to it ──
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub release
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "Wuggy ${GITHUB_REF_NAME#v}" \
            --generate-notes \
            --repo "$GITHUB_REPOSITORY"
        env:
          GH_TOKEN: ${{ github.token }}

  # ── macOS: build .app via PyInstaller, package as .dmg via create-dmg ──
  build-macos:
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements-gui.txt pyinstaller

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build DMG
        run: ./build_dmg.sh

      - name: Upload DMG to release
        run: gh release upload "$GITHUB_REF_NAME" dist/Wuggy-*.dmg --clobber
        env:
          GH_TOKEN: ${{ github.token }}

  # ── Windows: build with PyInstaller, package as .zip ──
  build-windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements-gui.txt pyinstaller

      - name: Build with PyInstaller
        run: python -m PyInstaller wuggy.spec --noconfirm

      - name: Package as zip
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME -replace '^v', ''
          Compress-Archive -Path dist\Wuggy -DestinationPath "dist\Wuggy-$version-windows.zip"

      - name: Upload zip to release
        shell: bash
        run: gh release upload "$GITHUB_REF_NAME" dist/Wuggy-*-windows.zip --clobber
        env:
          GH_TOKEN: ${{ github.token }}
